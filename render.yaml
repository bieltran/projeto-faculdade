services:
  - type: web
    name: projeto-faculdade-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    preDeployCommand: npx prisma db push
    startCommand: npm start
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: projeto-faculdade-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: "*"
      - key: ADMIN_EMAIL
        value: admin@admin.com
      - key: ADMIN_PASSWORD
        value: admin
      - key: ADMIN_NAME
        value: Administrador
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: projeto-faculdade-db
    plan: free
    databaseName: erp_crm
    user: erp_user
